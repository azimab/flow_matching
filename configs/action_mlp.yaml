model: action_mlp
# Flow is 2D per disk; condition adds disk one-hot only.

# training
epochs: 100
batch_size: 256
lr: 0.0003
sigma: 0.0
save_dir: checkpoints_action
log_every: 100

# rollout / sampling
n_ode_steps: 50
max_rollout_steps: 128
goal_threshold: 0.05

# obstacle avoidance (inference-time); with obstacles, ECI bridge mixing is always used (see sample_action.py).
robot_radii: [0.08, 0.08]
obstacles: []  # list of {center: [x, y], radius: r}
